<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Sumung — Chaos vs Clarity</title> <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"> <style> /* ===================== RESET & ROOT ===================== */ *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } html { scroll-behavior: smooth; } :root { --chaos-bg: #08050a; --chaos-red: #ff3d2e; --chaos-orange: #ff7a1a; --chaos-dim: rgba(255,61,46,.15); --clarity-bg: #04100e; --clarity-green: #00e09a; --clarity-teal: #0abf8a; --clarity-dim: rgba(0,224,154,.1); --gold: #f5c842; --gold-dim: rgba(245,200,66,.12); --ink: #050508; --paper: #f0ece3; --muted: rgba(240,236,227,.4); --faint: rgba(240,236,227,.07); } body { background: var(--ink); color: var(--paper); font-family: 'Barlow', sans-serif; overflow-x: hidden; cursor: none; } /* ===================== CURSOR ===================== */ #cur { position: fixed; width: 10px; height: 10px; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: background .2s, transform .15s, width .3s, height .3s; background: var(--gold); mix-blend-mode: difference; } #curR { position: fixed; width: 38px; height: 38px; border: 1px solid rgba(245,200,66,.35); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: left .12s ease-out, top .12s ease-out, width .3s, height .3s, border-color .3s; } body.hov #cur { transform: translate(-50%,-50%) scale(0); } body.hov #curR { width: 56px; height: 56px; border-color: var(--gold); border-width: 2px; } /* ===================== PROGRESS BAR ===================== */ #progressBar { position: fixed; top: 0; left: 0; height: 2px; z-index: 200; background: linear-gradient(to right, var(--chaos-red), var(--gold), var(--clarity-green)); transition: width .1s linear; width: 0%; } /* ===================== NAV ===================== */ nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 28px 60px; pointer-events: none; } .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; letter-spacing: .06em; color: var(--paper); opacity: .9; } .nav-act { font-family: 'IBM Plex Mono', monospace; font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); transition: color .5s; } /* ===================== ACT DOTS ===================== */ #actDots { position: fixed; right: 32px; top: 50%; transform: translateY(-50%); z-index: 100; display: flex; flex-direction: column; gap: 10px; } .act-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(240,236,227,.15); transition: background .4s, transform .3s; cursor: none; } .act-dot.active { background: var(--gold); transform: scale(1.5); } /* ===================== SHARED SECTION ===================== */ .act { position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; overflow: hidden; } /* ===================== ACT 0: PRELUDE ===================== */ #act0 { background: var(--ink); align-items: center; text-align: center; padding: 120px 60px; } .prelude-canvas { position: absolute; inset: 0; width: 100%; height: 100%; } .prelude-inner { position: relative; z-index: 2; } .prelude-kicker { font-family: 'IBM Plex Mono', monospace; font-size: .65rem; letter-spacing: .28em; text-transform: uppercase; color: var(--chaos-red); margin-bottom: 32px; opacity: 0; animation: fadeUp .8s .3s ease forwards; display: inline-flex; align-items: center; gap: 14px; } .prelude-kicker::before, .prelude-kicker::after { content: ''; display: block; width: 36px; height: 1px; background: var(--chaos-red); } .prelude-h1 { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 8vw, 8rem); font-weight: 900; line-height: .95; letter-spacing: -.02em; opacity: 0; animation: fadeUp .9s .6s ease forwards; } .prelude-h1 .line1 { display: block; color: var(--chaos-red); } .prelude-h1 .line2 { display: block; color: var(--paper); font-style: italic; font-weight: 400; } .prelude-h1 .line3 { display: block; color: var(--gold); font-size: .55em; font-family: 'Barlow Condensed', sans-serif; font-weight: 300; letter-spacing: .15em; text-transform: uppercase; margin-top: 20px; } .prelude-desc { font-size: 1.05rem; color: var(--muted); max-width: 540px; margin: 36px auto 0; line-height: 1.85; opacity: 0; animation: fadeUp .8s 1s ease forwards; } .scroll-cue { margin-top: 64px; font-family: 'IBM Plex Mono', monospace; font-size: .6rem; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 12px; opacity: 0; animation: fadeUp .8s 1.4s ease forwards; } .scroll-line { width: 1px; height: 48px; background: linear-gradient(to bottom, var(--gold), transparent); animation: pulse 2s ease-in-out infinite; } @keyframes pulse { 0%,100%{opacity:.3}50%{opacity:1} } @keyframes fadeUp { from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)} } /* ===================== ACT 1: THE CHAOS ===================== */ #act1 { background: var(--chaos-bg); min-height: 200vh; } #chaosCanvas { position: sticky; top: 0; width: 100%; height: 100vh; display: block; } .chaos-overlay { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: center; padding: 0 80px; } .chaos-text-block { position: sticky; top: 50%; transform: translateY(-50%); z-index: 10; padding: 0 80px; pointer-events: none; } /* red noise overlay */ #act1::before { content: ''; position: absolute; inset: 0; z-index: 1; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,61,46,.015) 2px, rgba(255,61,46,.015) 4px); pointer-events: none; } .chaos-chapter { font-family: 'IBM Plex Mono', monospace; font-size: .6rem; letter-spacing: .25em; text-transform: uppercase; color: var(--chaos-red); margin-bottom: 20px; } .chaos-headline { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem,6vw,6rem); font-weight: 900; line-height: 1.0; color: var(--paper); } .chaos-headline span { color: var(--chaos-red); display: block; } .chaos-sub { font-size: 1rem; color: var(--muted); margin-top: 24px; line-height: 1.85; max-width: 440px; } .chaos-sub strong { color: var(--chaos-orange); font-weight: 500; } /* floating stress pills */ .stress-pills { position: absolute; bottom: 80px; left: 80px; z-index: 10; display: flex; flex-wrap: wrap; gap: 10px; max-width: 600px; pointer-events: none; } .s-pill { font-family: 'IBM Plex Mono', monospace; font-size: .65rem; padding: 6px 14px; border-radius: 2px; border: 1px solid rgba(255,61,46,.3); background: rgba(255,61,46,.08); color: rgba(255,120,80,.8); letter-spacing: .06em; animation: pillShake var(--d,3s) ease-in-out infinite; } @keyframes pillShake { 0%,100%{transform:translateY(0) rotate(var(--r,0deg))} 25%{transform:translateY(-3px) rotate(calc(var(--r,0deg) + 1deg))} 75%{transform:translateY(2px) rotate(calc(var(--r,0deg) - 1deg))} } /* ===================== ACT 2: THE CUT ===================== */ #act2 { background: linear-gradient(to bottom, var(--chaos-bg), #060c10); min-height: 100vh; align-items: center; justify-content: center; } #cutCanvas { position: absolute; inset: 0; width: 100%; height: 100%; } .cut-inner { position: relative; z-index: 10; text-align: center; padding: 60px; } .cut-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem,5vw,5rem); font-weight: 400; font-style: italic; color: var(--gold); line-height: 1.15; text-shadow: 0 0 60px rgba(245,200,66,.3); } .cut-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 300; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-top: 20px; } .cut-line { width: 2px; height: 80px; background: linear-gradient(to bottom, transparent, var(--gold), transparent); margin: 40px auto; animation: cutPulse 2s ease-in-out infinite; } @keyframes cutPulse { 0%,100%{opacity:.4;transform:scaleY(.8)}50%{opacity:1;transform:scaleY(1)} } /* ===================== ACT 3: DRAG DIVIDER ===================== */ #act3 { background: #060a0f; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; gap: 40px; padding: 80px 60px; } .drag-label { font-family: 'IBM Plex Mono', monospace; font-size: .62rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); text-align: center; } .drag-label span { color: var(--gold); } .divider-stage { width: 100%; max-width: 1100px; height: 500px; position: relative; border: 1px solid rgba(240,236,227,.06); border-radius: 4px; overflow: hidden; user-select: none; } #divCanvas { display: block; width: 100%; height: 100%; } .divider-handle { position: absolute; top: 0; bottom: 0; width: 3px; background: var(--gold); box-shadow: 0 0 20px rgba(245,200,66,.6); cursor: ew-resize; z-index: 10; transition: box-shadow .2s; } .divider-handle:hover { box-shadow: 0 0 40px rgba(245,200,66,.9); } .handle-knob { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 40px; height: 40px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: .9rem; color: var(--ink); font-weight: 700; box-shadow: 0 0 20px rgba(245,200,66,.5); } .side-label { position: absolute; top: 24px; font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; pointer-events: none; } .side-label.chaos { left: 24px; color: rgba(255,80,60,.5); } .side-label.clarity { right: 24px; color: rgba(0,220,140,.5); } /* progress strip */ .drag-progress { width: 100%; max-width: 1100px; display: flex; align-items: center; gap: 20px; } .dp-bar { flex: 1; height: 3px; background: rgba(240,236,227,.06); border-radius: 2px; overflow: hidden; } .dp-fill { height: 100%; background: linear-gradient(to right, var(--chaos-red), var(--gold), var(--clarity-green)); transition: width .15s; } .dp-label { font-family: 'IBM Plex Mono', monospace; font-size: .58rem; color: var(--muted); letter-spacing: .1em; min-width: 80px; } /* ===================== ACT 4: THE CLARITY ===================== */ #act4 { background: var(--clarity-bg); min-height: 200vh; } #clarityCanvas { position: sticky; top: 0; width: 100%; height: 100vh; display: block; } #act4::before { content: ''; position: absolute; inset: 0; z-index: 1; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,224,154,.012) 2px, rgba(0,224,154,.012) 4px); pointer-events: none; } .clarity-text-block { position: sticky; top: 50%; transform: translateY(-50%); z-index: 10; padding: 0 80px; text-align: right; pointer-events: none; } .clarity-chapter { font-family: 'IBM Plex Mono', monospace; font-size: .6rem; letter-spacing: .25em; text-transform: uppercase; color: var(--clarity-green); margin-bottom: 20px; } .clarity-headline { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem,6vw,6rem); font-weight: 900; line-height: 1.0; color: var(--paper); } .clarity-headline span { color: var(--clarity-green); display: block; } .clarity-sub { font-size: 1rem; color: var(--muted); margin-top: 24px; line-height: 1.85; margin-left: auto; max-width: 440px; } .clarity-sub strong { color: var(--clarity-green); font-weight: 500; } .calm-pills { position: absolute; bottom: 80px; right: 80px; z-index: 10; display: flex; flex-wrap: wrap; gap: 10px; max-width: 500px; justify-content: flex-end; pointer-events: none; } .c-pill { font-family: 'IBM Plex Mono', monospace; font-size: .65rem; padding: 6px 14px; border-radius: 2px; border: 1px solid rgba(0,224,154,.2); background: rgba(0,224,154,.06); color: rgba(0,200,140,.8); letter-spacing: .06em; } /* ===================== ACT 5: INVITATION ===================== */ #act5 { background: var(--ink); align-items: center; text-align: center; padding: 140px 60px; min-height: 100vh; } #finalCanvas { position: absolute; inset: 0; width: 100%; height: 100%; } .invite-inner { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; } .invite-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: .6rem; letter-spacing: .25em; text-transform: uppercase; color: var(--gold); margin-bottom: 32px; } .invite-title { font-family: 'Playfair Display', serif; font-size: clamp(3rem,7vw,7rem); font-weight: 900; line-height: .95; letter-spacing: -.02em; } .invite-title .t1 { display: block; color: var(--paper); } .invite-title .t2 { display: block; font-style: italic; font-weight: 400; color: var(--clarity-green); } .invite-sub { font-size: 1.05rem; color: var(--muted); margin-top: 32px; line-height: 1.85; max-width: 520px; margin-inline: auto; } .invite-form { margin-top: 52px; display: flex; gap: 0; max-width: 480px; margin-inline: auto; } .invite-input { flex: 1; padding: 16px 20px; background: rgba(240,236,227,.05); border: 1px solid rgba(240,236,227,.1); border-right: none; color: var(--paper); font-family: 'Barlow', sans-serif; font-size: .95rem; outline: none; transition: border-color .3s; cursor: none; } .invite-input:focus { border-color: var(--clarity-green); } .invite-input::placeholder { color: rgba(240,236,227,.25); } .invite-btn { padding: 16px 28px; background: var(--clarity-green); color: var(--ink); border: none; font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; cursor: none; transition: box-shadow .3s, transform .2s; white-space: nowrap; } .invite-btn:hover { box-shadow: 0 0 40px rgba(0,224,154,.4); transform: translateX(2px); } .invite-trust { margin-top: 24px; font-family: 'IBM Plex Mono', monospace; font-size: .58rem; color: rgba(240,236,227,.2); letter-spacing: .1em; display: flex; justify-content: center; gap: 24px; } /* success */ .invite-success { display: none; margin-top: 52px; background: rgba(0,224,154,.06); border: 1px solid rgba(0,224,154,.15); border-radius: 4px; padding: 32px; } .invite-success.show { display: block; animation: fadeUp .6s ease both; } .invite-success h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-style: italic; color: var(--clarity-green); margin-bottom: 12px; } .invite-success p { font-size: .9rem; color: var(--muted); line-height: 1.7; } /* stats row */ .stat-row { display: flex; gap: 60px; justify-content: center; margin-top: 72px; border-top: 1px solid rgba(240,236,227,.05); padding-top: 56px; flex-wrap: wrap; } .stat-item { text-align: center; } .stat-num { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: var(--paper); display: block; line-height: 1; } .stat-num em { color: var(--clarity-green); font-style: normal; } .stat-lbl { font-family: 'IBM Plex Mono', monospace; font-size: .58rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; margin-top: 8px; } /* ===================== CHAPTER DIVIDERS ===================== */ .chapter-divider { padding: 60px; text-align: center; border-top: 1px solid var(--faint); border-bottom: 1px solid var(--faint); background: rgba(0,0,0,.4); position: relative; z-index: 5; } .cd-num { font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 900; color: var(--faint); line-height: 1; } .cd-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 300; letter-spacing: .25em; text-transform: uppercase; color: var(--muted); margin-top: 8px; } .cd-rule { width: 60px; height: 1px; background: var(--gold); margin: 20px auto 0; } /* footer */ footer { padding: 48px 60px; border-top: 1px solid var(--faint); display: flex; justify-content: space-between; align-items: center; background: #030305; } .foot-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: rgba(240,236,227,.2); } .foot-copy { font-family: 'IBM Plex Mono', monospace; font-size: .55rem; color: rgba(240,236,227,.12); letter-spacing: .12em; } /* ===================== UTILITIES ===================== */ .reveal { opacity: 0; transform: translateY(24px); transition: opacity .8s ease, transform .8s ease; } .reveal.vis { opacity: 1; transform: none; } @media(max-width: 768px) { nav { padding: 20px 24px; } .act { padding: 0 20px; } #act0, #act3, #act5 { padding-left: 24px; padding-right: 24px; } .chaos-text-block, .clarity-text-block { padding: 0 24px; } .stress-pills, .calm-pills { left: 24px; right: 24px; bottom: 40px; } .divider-stage { height: 300px; } .stat-row { gap: 32px; } #actDots { display: none; } body { cursor: auto; } #cur, #curR { display: none; } footer { flex-direction: column; gap: 12px; } .invite-form { flex-direction: column; } .invite-input { border-right: 1px solid rgba(240,236,227,.1); border-bottom: none; } } </style> </head> <body> ... (content truncated due to size limits, but in execution, full content would be written) ... </body> </html>
